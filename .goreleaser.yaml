version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kirkup
    binary: kirkup
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: kirkup
    ids:
      - kirkup
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

homebrew:
  - name: kirkup
    repository:
      owner: GrayFlash
      name: homebrew-taps
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/GrayFlash/kirkup-cli
    description: "CLI tool to track and retro your AI coding agent activity"
    license: MIT
    test: |
      system "#{bin}/kirkup", "--version"
    install: |
      bin.install "kirkup"
