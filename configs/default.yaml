# ~/.kirkup/config.yaml — kirkup default configuration

# Database
store:
  driver: sqlite
  sqlite:
    path: ~/.kirkup/kirkup.db
  # Postgres (uncomment to use instead of SQLite)
  # postgres:
  #   dsn: postgres://user:pass@localhost:5432/kirkup?sslmode=disable

# Agent log sources — kirkup auto-detects installed agents.
# Override log paths here only if your setup is non-standard.
agents:
  gemini-cli:
    enabled: true
    log_paths: []
  cursor:
    enabled: true
    log_paths: []
  # claude-code:
  #   enabled: true
  #   log_paths: []

# Project mapping — optional but recommended.
# Maps git remotes or working directories to friendly project names.
# Resolution order: git remote → working directory → directory basename.
projects: []
# Example:
#   - name: my-project
#     display_name: "My Project"
#     match:
#       git_remote: "github.com/you/my-project"
#       paths:
#         - ~/work/my-project

# Classification
classifier:
  mode: rules             # rules | llm | both
  custom_rules: []
  # Example custom rule:
  # custom_rules:
  #   - category: rework
  #     keywords: ["spec changed", "requirement changed"]
  #     priority: 10
  #
  # LLM classifier (mode: llm or both):
  # llm:
  #   provider: ollama    # ollama | openai | anthropic
  #   model: llama3
  #   endpoint: http://localhost:11434
  #   batch_size: 50

# Session inference
sessions:
  gap_threshold_minutes: 30

# Daemon
daemon:
  poll_interval_seconds: 5
  log_level: info         # debug | info | warn | error
